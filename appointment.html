<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instyle Salon - Book Appointment</title>
    
    <!-- Premium Fonts matching website1.html -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    
    <style>
        /* --- Global Reset & Variables --- */
        :root {
            --bg-color: #0a0a0a;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --accent-gold: #d4ba99;
            --accent-gold-hover: #e8d0b3;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-hover: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- Split Layout Container --- */
        .split-layout {
            display: flex;
            min-height: 100vh;
            width: 100%;
        }

        /* =========================================
           LEFT SIDE (Image & Logo)
           ========================================= */
        .left-panel {
            flex: 0 0 45%;
            position: relative;
            background: url('https://images.pexels.com/photos/3993320/pexels-photo-3993320.jpeg?auto=compress&cs=tinysrgb&w=1200') center/cover no-repeat;
        }
        
        .left-panel::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, rgba(10,10,10,0.2), var(--bg-color));
        }

        /* Logo over the image */
        .salon-logo {
            position: absolute;
            top: 40px;
            left: 50px;
            z-index: 2;
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .salon-icon {
            width: 32px;
            height: 32px;
            color: var(--text-main);
        }

        .salon-logo-text {
            display: flex;
            flex-direction: column;
        }

        .salon-logo .brand {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            font-weight: 600;
            color: var(--text-main);
            letter-spacing: 1px;
            line-height: 1;
        }

        .salon-logo .sub {
            font-family: 'Inter', sans-serif;
            font-size: 10px;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--accent-gold);
            margin-top: 4px;
        }

        /* =========================================
           RIGHT SIDE (Content & Booking Form)
           ========================================= */
        .right-panel {
            flex: 0 0 55%;
            padding: 60px 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }

        /* Decorative background glow */
        .right-panel::before {
            content: '';
            position: absolute;
            top: 20%;
            left: 20%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(212,186,153,0.05) 0%, transparent 70%);
            z-index: -1;
            border-radius: 50%;
            filter: blur(40px);
        }

        /* Headline & Paragraph */
        .main-headline {
            font-family: 'Playfair Display', serif;
            font-size: 52px;
            line-height: 1.1;
            font-weight: 500;
            margin-bottom: 20px;
            color: var(--text-main);
        }

        .main-headline span {
            font-style: italic;
            color: var(--accent-gold);
        }

        .sub-desc {
            font-size: 15px;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 40px;
            max-width: 85%;
            font-weight: 300;
        }

        /* --- Glassmorphism Booking Card --- */
        .booking-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 40px 45px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .form-title {
            font-family: 'Playfair Display', serif;
            color: var(--text-main);
            font-size: 26px;
            margin-bottom: 30px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-title::before {
            content: '❖';
            color: var(--accent-gold);
            font-size: 18px;
        }

        /* Form Grid (2 Columns) */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 10px;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        /* Inputs & Selects Styling */
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper input,
        .input-wrapper select {
            width: 100%;
            background-color: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            padding: 14px 18px;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            color: var(--text-main);
            appearance: none;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-wrapper input:focus,
        .input-wrapper select:focus {
            border-color: var(--accent-gold);
            background-color: rgba(0,0,0,0.5);
            box-shadow: 0 0 0 4px rgba(212,186,153,0.1);
        }
        
        /* Dropdown options fix for dark theme */
        .input-wrapper select option {
            background-color: #1a1a1a;
            color: #fff;
        }

        /* Icons inside inputs */
        .input-icon {
            position: absolute;
            right: 18px;
            pointer-events: none;
            display: flex;
            align-items: center;
        }

        .icon-check { color: #4ade80; }
        .icon-arrow { color: var(--text-muted); }
        .icon-lock { color: var(--text-muted); }

        /* --- Time Slots Section --- */
        .time-section {
            margin-bottom: 35px;
        }

        .time-label {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 15px;
            font-weight: 400;
            display: block;
            letter-spacing: 0.5px;
        }

        .time-slots {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .time-pill {
            background-color: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .time-pill:hover {
            border-color: var(--accent-gold);
            background-color: rgba(212,186,153,0.05);
        }

        /* Active/Selected Time Slot */
        .time-pill.active {
            background-color: var(--accent-gold);
            border-color: var(--accent-gold);
            color: var(--bg-color);
            font-weight: 500;
            box-shadow: 0 4px 15px rgba(212,186,153,0.3);
        }

        /* --- Submit Button --- */
        .btn-submit-container {
            margin-top: 10px;
        }

        .btn-submit {
            background-color: var(--accent-gold);
            color: var(--bg-color);
            border: none;
            padding: 16px 45px;
            font-size: 15px;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            gap: 10px;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-submit:hover {
            background-color: var(--accent-gold-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(212,186,153,0.4);
        }

        /* =========================================
           RESPONSIVE DESIGN (Mobile/Tablet)
           ========================================= */
        @media (max-width: 1024px) {
            .main-headline { font-size: 42px; }
            .right-panel { padding: 50px 40px; }
        }

        @media (max-width: 850px) {
            .split-layout { flex-direction: column; }
            
            .left-panel {
                flex: none;
                height: 35vh;
                width: 100%;
            }

            .left-panel::after {
                background: linear-gradient(to bottom, transparent, var(--bg-color));
            }

            .right-panel {
                flex: none;
                width: 100%;
                padding: 40px 25px;
            }

            .main-headline { font-size: 36px; }
            .sub-desc { max-width: 100%; }
            .booking-card { padding: 30px 25px; }
            .form-grid { grid-template-columns: 1fr; gap: 20px;}
            .time-slots { justify-content: flex-start; }
            
            .salon-logo {
                top: 25px;
                left: 25px;
            }
        }
    </style>
</head>
<body>

    <div class="split-layout">
        
        <!-- LEFT PANEL (Image & Logo) -->
        <div class="left-panel">
            <a href="index.html" class="salon-logo">
                <svg class="salon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M12 2L15 9L22 12L15 15L12 22L9 15L2 12L9 9L12 2Z"></path>
                </svg>
                <div class="salon-logo-text">
                    <span class="brand">INSTYLE</span>
                    <span class="sub">Hair Salon</span>
                </div>
            </a>
        </div>

        <!-- RIGHT PANEL (Content & Form) -->
        <div class="right-panel">
            
            <h1 class="main-headline">Experience <span>True</span><br>Elegance</h1>
            
            <p class="sub-desc">
                Book your session with our expert stylists and cosmetologists. We tailor every service to bring out your natural, glowing beauty.
            </p>

            <!-- Booking Card -->
            <div class="booking-card">
                <h2 class="form-title">Reserve Your Spot</h2>

                <form action="index.html" method="GET">
                    <div class="form-grid">
                        
                        <!-- Input 1: Client Name -->
                        <div class="input-group">
                            <label>Full Name</label>
                            <div class="input-wrapper">
                                <input type="text" placeholder="Enter your name" required>
                                <div class="input-icon icon-check">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                                </div>
                            </div>
                        </div>

                        <!-- Input 2: Select Service -->
                        <div class="input-group">
                            <label>Select Category</label>
                            <div class="input-wrapper">
                                <select required>
                                    <option value="" disabled selected>Choose category</option>
                                    <option value="hair">Hair Styling & Cuts</option>
                                    <option value="color">Hair Coloring</option>
                                    <option value="spa">Hair Spa & Treatment</option>
                                    <option value="makeup">Professional Makeup</option>
                                </select>
                                <div class="input-icon icon-arrow">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
                                </div>
                            </div>
                        </div>

                        <!-- Input 3: Select Stylist -->
                        <div class="input-group">
                            <label>Preferred Stylist</label>
                            <div class="input-wrapper">
                                <select>
                                    <option value="any">Anyone Available</option>
                                    <option value="emma">Emma Rose</option>
                                    <option value="sophia">Sophia Lane</option>
                                    <option value="jane">Jane Doe</option>
                                    <option value="olivia">Olivia Tate</option>
                                </select>
                                <div class="input-icon icon-arrow">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
                                </div>
                            </div>
                        </div>

                        <!-- Input 4: Select Date -->
                        <div class="input-group">
                            <label>Select Date</label>
                            <div class="input-wrapper">
                                <input type="date" required style="color-scheme: dark;">
                                <div class="input-icon icon-lock">
                                    <!-- Calendar Icon -->
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                                </div>
                            </div>
                        </div>

                    </div>

                    <!-- Time Slots -->
                    <div class="time-section">
                        <span class="time-label">Available Time Slots</span>
                        <div class="time-slots">
                            <button type="button" class="time-pill">09:00 AM</button>
                            <button type="button" class="time-pill active">10:30 AM</button>
                            <button type="button" class="time-pill">12:00 PM</button>
                            <button type="button" class="time-pill">02:30 PM</button>
                            <button type="button" class="time-pill">04:00 PM</button>
                            <button type="button" class="time-pill">05:30 PM</button>
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <div class="btn-submit-container">
                        <button type="submit" class="btn-submit">
                            Confirm Appointment
                        </button>
                    </div>

                </form>
            </div>
            
        </div>
    </div>

    <!-- Small script to handle time pill clicks for UI demo -->
    <script>
        const pills = document.querySelectorAll('.time-pill');
        pills.forEach(pill => {
            pill.addEventListener('click', () => {
                pills.forEach(p => p.classList.remove('active'));
                pill.classList.add('active');
            });
        });
    </script>
</body>
</html>
